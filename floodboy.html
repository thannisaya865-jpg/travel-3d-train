<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodBoy Blockchain WebApp | Latest Sensor Data</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #3B82F6;
            --primary-green: #10B981;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            margin-bottom: 24px;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .header-content h1 {
            font-size: 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .store-nickname {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .store-desc {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .meta-info {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .meta-info .block-badge {
            display: inline-flex;
            align-items: center;
            background-color: #d1fae5;
            color: #065f46;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .meta-info .block-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .address-link {
            color: var(--primary-blue);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .address-link:hover {
            text-decoration: underline;
        }

        /* Chart Section */
        .chart-section {
            margin-bottom: 32px;
        }

        .chart-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn.active-water {
            background-color: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .btn.active-voltage {
            background-color: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        .chart-container {
            width: 100%;
            height: 350px;
            position: relative;
        }

        /* Table Section */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 32px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            font-weight: 600;
            color: var(--text-muted);
            background-color: #f9fafb;
        }

        .data-table tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .data-table tbody tr:hover {
            background-color: #f3f4f6;
        }

        /* Footer Section */
        .footer {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Loading Overlay */
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }

            .meta-info {
                text-align: left;
            }

            .footer {
                grid-template-columns: 1fr;
            }

            .data-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 16px; font-weight: 500; color: var(--text-main);">Syncing with JIBCHAIN L1...</p>
    </div>

    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="header-content">
                    <h1>Latest Sensor Data</h1>
                    <div class="store-nickname" id="ui-nickname">FloodBoy001</div>
                    <div class="store-desc" id="ui-desc">Northern Thailand Flood Monitor</div>
                </div>
                <div class="meta-info">
                    <div class="block-badge" id="ui-current-block">Current Block: Syncing...</div>
                    <div id="ui-last-updated">Last Updated: --:--:--</div>
                    <div style="margin-top: 4px;">
                        <a href="#" class="address-link" id="ui-store-link" target="_blank">
                            <span id="ui-store-addr">0xCd3Ec17d...d1A8Bb</span>
                            <i class="fa-solid fa-arrow-up-right-from-square" style="font-size: 0.8em;"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="chart-section">
                <div class="chart-controls">
                    <button class="btn active-water" id="btn-water">Water Depth</button>
                    <button class="btn" id="btn-voltage">Battery Voltage</button>
                </div>
                <div class="chart-container">
                    <canvas id="historicalChart"></canvas>
                </div>
            </div>

            <!-- Data Table -->
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Metric</th>
                        <th>Current</th>
                        <th>Min</th>
                        <th>Max</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>

            <!-- Footer -->
            <div class="footer">
                <div><i class="fa-regular fa-clock"></i> Last Updated: <span id="ft-updated">--</span></div>
                <div><i class="fa-solid fa-user-shield"></i> Store Owner:
                    <a href="#" class="address-link" target="_blank" id="ft-owner">Unknown</a>
                </div>
                <div><i class="fa-solid fa-cubes"></i> Deployed Block: <a href="#" class="address-link" target="_blank"
                        id="ft-deployed">--</a></div>
                <div><i class="fa-solid fa-satellite-dish"></i> Sensor Count: <span id="ft-sensors">--</span> authorized
                    sensor</div>
            </div>
        </div>
    </div>

    <!-- Ethers.js v6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

    <script>
        console.log("Page loaded, starting Ethers.js initialization...");

        // JIBCHAIN L1 Configuration
        const JIB_RPC = 'https://rpc-l1.jibchain.net';
        const FACTORY_ADDRESS = '0x63bB41b79b5aAc6e98C7b35Dcb0fE941b85Ba5Bb';
        const STORE_ADDRESS = '0xCd3Ec17ddFDa24f8F97131fa0FDf20e7cbd1A8Bb';
        const UNIVERSAL_SIGNER = '0xcB0e58b011924e049ce4b4D62298Edf43dFF0BDd';

        // ABIs
        const FactoryABI = [
            "function getStoreInfo(address store) view returns (string nickname, address owner, uint256 authorizedSensorCount, uint128 deployedBlock, string description)"
        ];

        const StoreABI = [
            "function getAllFields() view returns (tuple(string name, string unit, string dtype)[] fields)",
            "function getLatestRecord(address sensor) view returns (uint256 timestamp, int256[] values)",
            "event RecordStored(address indexed sensor, uint256 timestamp, int256[] values)"
        ];

        // Utils
        const truncateAddr = (addr) => `${addr.slice(0, 10)}...${addr.slice(-6)}`;

        function processValue(value, unit) {
            const val = Number(value);
            const baseUnit = unit.replace(/ x\d+/, '');
            if (unit.includes('x10000')) return (val / 10000).toFixed(4) + ' ' + baseUnit;
            if (unit.includes('x1000')) return (val / 1000).toFixed(3) + ' ' + baseUnit;
            if (unit.includes('x100')) return (val / 100).toFixed(3) + ' ' + baseUnit;
            return val + ' ' + baseUnit;
        }

        function formatFieldName(baseName, allFields, values) {
            let name = baseName.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            const countIndex = allFields.findIndex(f => f.name === `${baseName}_count`);
            if (countIndex >= 0 && values && values[countIndex] !== undefined) {
                name += ` (${values[countIndex]} samples)`;
            }
            return name;
        }

        // Global State
        let chartInstance = null;
        let historicalData = [];
        let provider, factoryContract, storeContract;

        async function init() {
            console.log("Init started with Ethers...");
            try {
                provider = new ethers.JsonRpcProvider(JIB_RPC);
                factoryContract = new ethers.Contract(FACTORY_ADDRESS, FactoryABI, provider);
                storeContract = new ethers.Contract(STORE_ADDRESS, StoreABI, provider);

                const currentBlockNumber = await provider.getBlockNumber();
                console.log("Current block:", currentBlockNumber);
                document.getElementById('ui-current-block').innerText = `Current Block: ${currentBlockNumber}`;

                // 1. Get Store Info
                console.log("Fetching store info...");
                const info = await factoryContract.getStoreInfo(STORE_ADDRESS);
                const [nickname, owner, sensorCount, deployedBlock, description] = info;
                console.log("Store info fetched:", nickname);

                document.getElementById('ui-nickname').innerText = nickname;
                document.getElementById('ui-desc').innerText = description;
                document.getElementById('ui-store-addr').innerText = truncateAddr(STORE_ADDRESS);
                document.getElementById('ui-store-link').href = `https://exp.jibchain.net/address/${STORE_ADDRESS}`;

                document.getElementById('ft-owner').innerText = truncateAddr(owner);
                document.getElementById('ft-owner').href = `https://exp.jibchain.net/address/${owner}`;
                document.getElementById('ft-deployed').innerText = `#${deployedBlock}`;
                document.getElementById('ft-deployed').href = `https://exp.jibchain.net/block/${deployedBlock}`;
                document.getElementById('ft-sensors').innerText = sensorCount.toString();

                // 2. Get Fields & Latest Data
                console.log("Fetching fields...");
                const fields = await storeContract.getAllFields();
                console.log("Fields fetched:", fields.length);

                console.log("Fetching latest record...");
                const record = await storeContract.getLatestRecord(UNIVERSAL_SIGNER);
                const [timestamp, values] = record;
                console.log("Latest record fetched at:", Number(timestamp));

                const date = new Date(Number(timestamp) * 1000);
                document.getElementById('ui-last-updated').innerText = `Last Updated: ${date.toLocaleTimeString('en-US')}`;
                document.getElementById('ft-updated').innerText = date.toLocaleString('en-US');

                // 3. Process Data Table
                const families = {};
                fields.forEach((f, idx) => {
                    if (f.name.includes('_count')) return;
                    let isMin = f.name.endsWith('_min');
                    let isMax = f.name.endsWith('_max');
                    let baseName = f.name.replace('_min', '').replace('_max', '');

                    if (!families[baseName]) families[baseName] = { unit: f.unit };
                    if (isMin) families[baseName].min = processValue(values[idx], f.unit);
                    else if (isMax) families[baseName].max = processValue(values[idx], f.unit);
                    else families[baseName].current = processValue(values[idx], f.unit);
                });

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                for (const [baseName, data] of Object.entries(families)) {
                    const row = document.createElement('tr');
                    const displayName = formatFieldName(baseName, fields, values);
                    row.innerHTML = `
                        <td>${displayName}</td>
                        <td style="font-weight:600">${data.current || '--'}</td>
                        <td>${data.min || '--'}</td>
                        <td>${data.max || '--'}</td>
                    `;
                    tbody.appendChild(row);
                }

                // 4. Fetch Historical Data (RecordStored events)
                console.log("Fetching historical events...");
                const filter = storeContract.filters.RecordStored(UNIVERSAL_SIGNER);
                const fromBlock = currentBlockNumber - 5000; // Limit range for faster load
                const logs = await storeContract.queryFilter(filter, fromBlock, "latest");
                console.log("Events found:", logs.length);

                const wdIdx = fields.findIndex(f => f.name === 'water_depth');
                const bvIdx = fields.findIndex(f => f.name === 'battery_voltage');

                historicalData = logs.map(log => {
                    const { timestamp, values } = log.args;
                    return {
                        timestamp: Number(timestamp) * 1000,
                        waterDepth: wdIdx >= 0 ? Number(values[wdIdx]) / 10000 : null,
                        batteryVoltage: bvIdx >= 0 ? Number(values[bvIdx]) / 100 : null
                    };
                }).sort((a, b) => a.timestamp - b.timestamp);

                renderChart('water_depth');

                // Bind Buttons
                document.getElementById('btn-water').onclick = () => {
                    document.getElementById('btn-water').classList.add('active-water');
                    document.getElementById('btn-voltage').classList.remove('active-voltage');
                    renderChart('water_depth');
                };

                document.getElementById('btn-voltage').onclick = () => {
                    document.getElementById('btn-voltage').classList.add('active-voltage');
                    document.getElementById('btn-water').classList.remove('active-water');
                    renderChart('battery_voltage');
                };

                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error("Init Error:", err);
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #ef4444; margin-bottom: 16px;"></i>
                        <p style="font-weight: 500;">Connection Error</p>
                        <p style="font-size: 0.9rem; color: #6b7280; margin-top: 8px;">${err.message}</p>
                        <button onclick="location.reload()" class="btn" style="margin-top: 15px; background: #3b82f6; color: white;">Try Again</button>
                    </div>
                `;
            }
        }

        function smoothData(data, windowSize = 3) {
            return data.map((val, idx, arr) => {
                if (val === null) return null;
                const window = arr.slice(Math.max(idx - windowSize + 1, 0), idx + 1).filter(v => v !== null);
                return window.reduce((a, b) => a + b, 0) / window.length;
            });
        }

        function renderChart(type) {
            const ctx = document.getElementById('historicalChart').getContext('2d');
            if (historicalData.length === 0) return;

            const isWater = type === 'water_depth';
            const title = isWater ? 'Water Depth Over Time' : 'Battery Voltage Over Time';
            const unit = isWater ? 'm' : 'V';
            const color = isWater ? '#3B82F6' : '#10B981';

            const labels = historicalData.map(d => new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
            const rawValues = historicalData.map(d => isWater ? d.waterDepth : d.batteryVoltage);
            const smoothedValues = smoothData(rawValues, 3);

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${title} (Smoothed)`,
                        data: smoothedValues,
                        borderColor: color,
                        backgroundColor: isWater ? 'rgba(59, 130, 246, 0.1)' : 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)} ${unit}` }
                        }
                    },
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        window.addEventListener('load', init);
    </script>
</body>

</html>
